<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eM Client Monitor</title>
    <style>
      body { margin: 0; background: #0d0f14; color: #e4e6eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', system-ui, sans-serif; }
      #app-loading {
        display: flex; align-items: center; justify-content: center;
        height: 100vh; flex-direction: column; gap: 16px;
      }
      #app-loading .spinner {
        width: 28px; height: 28px; border: 2px solid #2c3242;
        border-top-color: #60a5fa; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loading .text { color: #737d92; font-size: 13px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading">
        <div class="spinner"></div>
        <div class="text">eM Client Monitor を起動中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
